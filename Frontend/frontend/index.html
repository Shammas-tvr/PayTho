<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1A7FA0" />
    <meta name="description" content="Paytho ERP — Enterprise Resource Platform" />
    <title>Paytho ERP</title>

    <!-- ── Favicon — replace old inline SVG with real PNG logos ── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/paytho-favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/paytho-favicon-16.png" />
    <!-- Apple touch icon (iPhone home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/paytho-favicon-32.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tabler Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
      rel="stylesheet"
    />

    <style>
      /* ── global reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root { height: 100%; width: 100%; }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: #D6EBF2;
        color: #0E2A36;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.5;
      }

      button       { font-family: inherit; cursor: pointer; }
      input,
      select,
      textarea     { font-family: inherit; }

      /* ── scrollbar ── */
      ::-webkit-scrollbar       { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #EAF2F5; }
      ::-webkit-scrollbar-thumb { background: #90C0D4; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #1A7FA0; }

      /* ── selection ── */
      ::selection { background: rgba(26,127,160,0.2); color: #0E2A36; }

      /* ── CSS tokens (shared across all pages) ── */
      :root {
        --bg:         #D6EBF2;
        --panel-l:    #B8D8E8;
        --panel-r:    #F0F8FB;
        --blue:       #1A7FA0;
        --blue-d:     #135E78;
        --blue-light: #D0EAF4;
        --teal:       #2DA898;
        --grey:       #5E8FA0;
        --grey-l:     #A8C8D8;
        --grey-ll:    #CCE3EC;
        --text:       #0E2A36;
        --text-m:     #2E5868;
        --text-s:     #5A8898;
        --text-ph:    #8AAEBB;
        --border:     #90C0D4;
        --border-f:   #1A7FA0;
        --inp:        #E4F2F8;
        --inp-focus:  #fff;
        --err-bg:     #FEF0EE;
        --err-b:      #F0B0A8;
        --err-t:      #922010;
      }

      /* ── app loader (shown before React mounts) ── */
      #app-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: var(--bg);
        z-index: 9999; gap: 16px;
        transition: opacity 0.3s;
      }

      /* ── logo image in loader ── */
      #app-loader .loader-logo {
        width: 80px;
        height: auto;
        display: block;
      }

      #app-loader .loader-bar {
        width: 160px; height: 3px;
        background: var(--grey-ll);
        border-radius: 99px; overflow: hidden;
      }
      #app-loader .loader-bar-fill {
        height: 100%; width: 40%;
        background: linear-gradient(90deg, var(--blue), var(--teal));
        border-radius: 99px;
        animation: loaderSlide 1.2s ease-in-out infinite;
      }
      #app-loader .loader-sub {
        font-size: 12px; color: var(--text-s);
        font-weight: 500; letter-spacing: 0.04em;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }

      @keyframes loaderSlide {
        0%   { transform: translateX(-100%); }
        50%  { transform: translateX(160%);  }
        100% { transform: translateX(160%);  }
      }

      /* ── shared spin animation (used by Login & other pages) ── */
      @keyframes spin { to { transform: rotate(360deg); } }
      .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    </style>
  </head>

  <body>
    <!-- ── Splash loader ── -->
    <div id="app-loader">

      <!--
        Logo image — uses the stamp PNG from public/ folder.
        File location: public/paytho-stamp-140x175-white.png
        The stamp already has "Paytho" + "ERP PLATFORM" text baked in,
        so no separate text element needed.
      -->
      <img
        class="loader-logo"
        src="/paytho-stamp-140x175-white.png"
        alt="Paytho ERP"
        width="80"
      />

      <!-- Loading bar -->
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>

      <!-- Tagline below bar -->
      <div class="loader-sub">Enterprise Resource Platform</div>

    </div>

    <!-- React root -->
    <div id="root"></div>

    <script>
      // Call window.__hideLoader() from main.jsx after React mounts
      window.__hideLoader = function () {
        var el = document.getElementById('app-loader');
        if (el) {
          el.style.opacity = '0';
          setTimeout(function () { el.remove(); }, 320);
        }
      };
    </script>

    <!-- Vite entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
